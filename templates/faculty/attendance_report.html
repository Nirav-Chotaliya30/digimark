{% extends "base.html" %}
{% block title %}Attendance Report | DigiMark{% endblock %}
{% block content %}
<div class="card-soft p-3 p-md-4 mb-3">
  <p class="muted-caption mb-1">Faculty Analytics</p>
  <h3 class="page-header mb-0">Attendance Report</h3>
</div>
<div class="card-soft p-3">
  <div class="row g-2 align-items-end">
    <div class="col-md-3">
      <label class="form-label">Subject</label>
      <select id="subjectFilter" class="form-select">
        <option value="">All</option>
        {% for s in subjects %}
        <option value="{{ s.id }}">{{ s.code }} - {{ s.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-2">
      <label class="form-label">Branch</label>
      <select id="branchFilter" class="form-select">
        <option value="">All</option>
        {% for branch in branches %}
        <option value="{{ branch }}">{{ branch }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-2"><label class="form-label">Passout Year</label><input id="yearFilter" class="form-control" type="number"></div>
    <div class="col-md-1"><label class="form-label">Sem</label><input id="semesterFilter" class="form-control" type="number" min="1" max="8"></div>
    <div class="col-md-2"><label class="form-label">Start</label><input id="startDate" class="form-control" type="date"></div>
    <div class="col-md-2"><label class="form-label">End</label><input id="endDate" class="form-control" type="date"></div>
    <div class="col-md-1"><button class="btn btn-brand w-100" onclick="loadReport()">Go</button></div>
  </div>
  <table class="table table-striped mt-3">
    <thead><tr><th>Enrollment</th><th>Name</th><th>Present</th><th>Total</th><th>Attendance %</th></tr></thead>
    <tbody id="reportBody"></tbody>
  </table>
</div>
{% endblock %}
{% block scripts %}
<script>
async function loadReport() {
  const params = new URLSearchParams();
  if (subjectFilter.value) params.set("subject_id", subjectFilter.value);
  if (branchFilter.value) params.set("branch", branchFilter.value);
  if (yearFilter.value) params.set("year", yearFilter.value);
  if (semesterFilter.value) params.set("semester", semesterFilter.value);
  if (startDate.value) params.set("start_date", startDate.value);
  if (endDate.value) params.set("end_date", endDate.value);
  const res = await fetch(`/api/faculty/attendance-summary?${params.toString()}`);
  const data = await res.json();
  const rows = (data.rows || []).map((r) => `<tr><td>${r.enrollment_no}</td><td>${r.full_name}</td><td>${r.present}</td><td>${r.total}</td><td><div class="progress"><div class="progress-bar ${r.attendance_percentage < 75 ? 'bg-danger' : 'bg-success'}" style="width:${r.attendance_percentage}%">${r.attendance_percentage}%</div></div></td></tr>`);
  document.getElementById("reportBody").innerHTML = rows.join("") || "<tr><td colspan='5'>No records found.</td></tr>";
}
</script>
{% endblock %}
